<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIRDBRAIN 4 Colonne - Impostazioni Tasti</title>
<style>
body {margin:0;overflow:hidden;font-family:Arial;background:black;color:white;}
#score,#combo{position:absolute;top:10px;font-size:24px;z-index:10;}
#score{left:10px;} #combo{right:10px;}
#gameCanvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;}
#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;
    background:url('immagine_2026-03-03_204259655.png') center center/cover no-repeat;
    filter:brightness(0.3) blur(4px);
    opacity:0; transition:opacity 2s ease-in;}
#hitLine{
    position:absolute;
    bottom:70px;
    left:0;
    width:100%;
    height:3px;
    background:rgba(255,255,255,0.5);
    z-index:5;
    opacity:0;
    transition:opacity 1.2s ease-in;
}
#menu{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;text-align:center;}
button{font-size:18px;padding:10px 20px;margin:5; cursor:pointer;}
.columnLabel{
    position:absolute;
    bottom:30px;
    font-size:20px;
    color:rgba(255,255,255,0.7);
    width:100px;
    text-align:center;
    transform:translateX(-50%);
    pointer-events:none;
}
#keySettings{
    position:absolute;
    top:60px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.7);
    padding:10px 15px;
    border-radius:8px;
    display:none;
    z-index:20;
}
#keySettings table{border-collapse:collapse;}
#keySettings td{
    border:1px solid rgba(255,255,255,0.3);
    padding:8px 15px;
    text-align:center;
    cursor:pointer;
    color:white;
    font-weight:bold;
}
#keySettings td:hover{background:rgba(255,255,255,0.2);}
</style>
</head>
<body>

<div id="bg"></div>
<div id="score">Punti: 0</div>
<div id="combo">Combo: 0x</div>
<div id="hitLine"></div>
<canvas id="gameCanvas"></canvas>

<div id="menu">
<button id="startBtn">Start</button>
<button id="settingsBtn">Impostazioni</button>
<div id="keySettings">
    <table>
        <tr>
            <td id="col0">D</td>
            <td id="col1">F</td>
            <td id="col2">J</td>
            <td id="col3">K</td>
        </tr>
    </table>
    <small>Clicca su un tasto per cambiarlo</small>
</div>
</div>

<audio id="bgm" src="BIRDBRAIN.mp3" crossorigin="anonymous"></audio>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");
const bgm=document.getElementById("bgm");
const startBtn=document.getElementById("startBtn");
const settingsBtn=document.getElementById("settingsBtn");
const hitLine=document.getElementById("hitLine");
const bg=document.getElementById("bg");
const keySettings=document.getElementById("keySettings");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let notes=[];
let score=0;
let combo=0;
let gameRunning=false;

// --- Config colonne e tasti ---
const columns = 4;
let columnKeys = ["D","F","J","K"];
let columnCodes = ["KeyD","KeyF","KeyJ","KeyK"];
const columnWidth = canvas.width/columns;

// Parametri difficoltà
let noteSpeed=400;
let noteCooldown=0.25;

// --- Disegna note ---
function drawNotes(currentTime){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Linee colonne
    for(let i=1;i<columns;i++){
        ctx.strokeStyle="rgba(200,200,200,0.3)";
        ctx.lineWidth=2;
        ctx.beginPath();
        ctx.moveTo(i*columnWidth,0);
        ctx.lineTo(i*columnWidth,canvas.height);
        ctx.stroke();
    }

    // Etichette tasti sotto
    for(let i=0;i<columns;i++){
        const x=i*columnWidth+columnWidth/2;
        const label=document.getElementById("label"+i);
        if(label) label.style.left=x+"px";
    }

    // Note
    ctx.fillStyle='red';
    notes.forEach(note=>{
        if(note.hit) return;
        const y=(currentTime - note.time)*noteSpeed;
        if(y > canvas.height) return;
        const size=columnWidth-20;
        const height=20;
        ctx.fillRect(note.column*columnWidth+10, y, size, height);
    });
}

// --- Barra hit-line effetto ---
function animateHitLine(){
    hitLine.style.background="rgba(255,255,255,1)";
    setTimeout(()=>{hitLine.style.background="rgba(255,255,255,0.5)";},100);
}

// --- Controllo tasti ---
let keysPressed={};
document.addEventListener("keydown",e=>{
    if(keysPressed[e.code]) return;
    keysPressed[e.code]=true;
    const currentTime=bgm.currentTime;
    let hit=false;
    notes.forEach(note=>{
        if(note.hit) return;
        const y=(currentTime - note.time)*noteSpeed;
        if(y>=canvas.height-90 && y<=canvas.height-50 && e.code===columnCodes[note.column]){
            note.hit=true;
            hit=true;
        }
    });
    if(hit){
        combo++; score+=100*combo;
        animateHitLine();
    } else {combo=0;}
    document.getElementById("score").innerText="Punti: "+score;
    document.getElementById("combo").innerText="Combo: "+combo+"x";
});
document.addEventListener("keyup",e=>{
    keysPressed[e.code]=false;
});

// --- Generazione note ---
let audioCtx, analyser, source, dataArray;
let lastNoteTime=0;
function setupAudio() {
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    source=audioCtx.createMediaElementSource(bgm);
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=512;
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    dataArray=new Uint8Array(analyser.frequencyBinCount);
}

function generateNotes(){
    if(!gameRunning) return;
    analyser.getByteFrequencyData(dataArray);
    let sum=0;
    for(let i=0;i<dataArray.length;i++) sum+=dataArray[i];
    const avg=sum/dataArray.length;
    const currentTime=bgm.currentTime;
    if(avg>50 && (currentTime - lastNoteTime) > noteCooldown){
        const column=Math.floor(Math.random()*columns);
        notes.push({column:column,hit:false,time:currentTime});
        lastNoteTime=currentTime;
    }
    requestAnimationFrame(generateNotes);
}

// --- Loop principale ---
function gameLoop(){
    if(!gameRunning) return;
    const currentTime=bgm.currentTime;
    drawNotes(currentTime);
    requestAnimationFrame(gameLoop);
}

// --- Start con difficoltà ---
startBtn.addEventListener("click",()=>{
    if(gameRunning) return;
    const diff=prompt("Seleziona difficoltà: facile, media, difficile","media");
    switch(diff.toLowerCase()){
        case "facile": noteSpeed=300; noteCooldown=0.5; break;
        case "media": noteSpeed=400; noteCooldown=0.25; break;
        case "difficile": noteSpeed=500; noteCooldown=0.15; break;
        default: noteSpeed=400; noteCooldown=0.25;
    }

    gameRunning=true;
    document.getElementById("menu").style.display="none";

    // crea label tasti
    for(let i=0;i<columns;i++){
        let label=document.createElement("div");
        label.id="label"+i;
        label.className="columnLabel";
        label.innerText=columnKeys[i];
        document.body.appendChild(label);
    }

    setupAudio();
    bg.style.opacity=1;
    setTimeout(()=>{
        hitLine.style.display="block";
        hitLine.style.opacity=1;
        bgm.currentTime=0;
        bgm.play();
    },500);

    generateNotes();
    requestAnimationFrame(gameLoop);
});

// --- Tabella interattiva impostazioni tasti ---
settingsBtn.addEventListener("click",()=>{
    keySettings.style.display = keySettings.style.display==="none"?"block":"none";
});

// cliccare su cella per cambiare tasto
for(let i=0;i<columns;i++){
    document.getElementById("col"+i).addEventListener("click",()=>{
        const newKey = prompt("Inserisci nuovo tasto per colonna "+(i+1), columnKeys[i]);
        if(newKey){
            columnKeys[i]=newKey.toUpperCase();
            columnCodes[i]="Key"+newKey.toUpperCase();
            document.getElementById("col"+i).innerText=columnKeys[i];
        }
    });
});
</script>
</body>
</html>
