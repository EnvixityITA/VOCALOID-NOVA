<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>War Thunder Wiki ITA</title>

<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: black;
    color: white;
    overflow-x: hidden;
    font-family: Arial, sans-serif;
}

/* Fade cinematografico iniziale */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    z-index: 999;
    animation: fadeIntro 2.5s ease forwards;
}

@keyframes fadeIntro {
    0% { opacity: 1; }
    100% { opacity: 0; visibility: hidden; }
}

/* Stelle */
#stars {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -3;
}

/* FUMO */
.smoke {
    position: absolute;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
    border-radius: 50%;
    filter: blur(40px);
    animation: smokeMove 10s infinite alternate ease-in-out;
}

.smoke:nth-child(1) { top: 20%; left: 30%; }
.smoke:nth-child(2) { top: 30%; left: 50%; animation-delay: 3s; }
.smoke:nth-child(3) { top: 10%; left: 60%; animation-delay: 6s; }

@keyframes smokeMove {
    0% { transform: scale(1) translateY(0); opacity: 0.4; }
    100% { transform: scale(1.5) translateY(-50px); opacity: 0.1; }
}

/* Sezione */
section {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    position: relative;
    animation: cinematicZoom 3s ease forwards;
}

@keyframes cinematicZoom {
    0% { transform: scale(1.2); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

/* Titolo */
.main-title {
    font-family: 'Black Ops One', cursive;
    font-size: 4em;
    text-transform: uppercase;
    letter-spacing: 5px;
    text-shadow: 
        0 0 10px red,
        0 0 20px darkred,
        0 0 40px crimson;
    z-index: 2;
}

/* Immagine */
.hero-img {
    width: 85%;
    max-width: 700px;
    margin-top: 30px;
    border-radius: 15px;
    box-shadow: 0 0 40px red;
    transition: 0.6s;
    z-index: 2;
}

.hero-img:hover {
    transform: scale(1.05);
}

/* Responsive */
@media (max-width: 600px) {
    .main-title {
        font-size: 2.5em;
    }
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<section>

    <!-- FUMO -->
    <div class="smoke"></div>
    <div class="smoke"></div>
    <div class="smoke"></div>

    <h1 class="main-title">WAR THUNDER WIKI ITA</h1>

    <!-- IMMAGINE CAMBIATA -->
    <img class="hero-img" 
    src="https://warthunder.com/i/opengraph-wt.jpg" 
    alt="War Thunder Battle Scene">

</section>

<script>
/* STELLE */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 200; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 2,
        velocity: Math.random() * 0.5
    });
}

function animateStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";

    stars.forEach(star => {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        ctx.fill();

        star.y += star.velocity;
        if (star.y > canvas.height) {
            star.y = 0;
            star.x = Math.random() * canvas.width;
        }
    });

    requestAnimationFrame(animateStars);
}

animateStars();
</script>

</body>
</html>
