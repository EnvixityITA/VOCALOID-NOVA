<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhythm Game Funzionale</title>
<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial;color:white}
#bgVideo,#bgImg{position:absolute;top:50%;left:50%;width:100%;height:100%;transform:translate(-50%,-50%);object-fit:cover;z-index:0;opacity:0;transition:opacity 1s;}
#gameCanvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2}
#menu{position:absolute;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:5;background:rgba(0,0,0,0.7);}
#logo{width:300px;margin-bottom:20px;animation:logoPulse 2s infinite alternate;}
@keyframes logoPulse{from{transform:scale(1)}to{transform:scale(1.05)}}
select,button{padding:12px 25px;margin:10px;font-size:18px;background:rgba(255,255,255,0.1);border:2px solid white;color:white;cursor:pointer;transition:all 0.2s;}
button:hover,select:hover{background:white;color:black;box-shadow:0 0 15px white;}
#hitLine{position:absolute;bottom:70px;left:0;width:100%;height:3px;background:rgba(255,255,255,0.5);z-index:3;}
#showStart{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;display:none;z-index:10;}
#results{position:absolute;width:100%;height:100%;display:none;flex-direction:column;justify-content:center;align-items:center;z-index:6;background:rgba(0,0,0,0.85);}
.rank{font-size:120px;animation:pop 0.6s ease;}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
.columnBar{position:absolute;top:0;width:2px;height:100%;background:rgba(255,255,255,0.3);z-index:2;}
.columnKey{position:absolute;bottom:30px;width:100px;text-align:center;transform:translateX(-50%);font-size:20px;color:rgba(255,255,255,0.8);pointer-events:none;}
</style>
</head>
<body>

<video id="bgVideo" autoplay muted loop playsinline></video>
<img id="bgImg">
<canvas id="gameCanvas"></canvas>
<div id="hitLine"></div>

<div id="menu">
<img id="logo" src="Risorsa_1sinny.png">
<select id="songSelect">
<option value="BIRDBRAIN">BIRDBRAIN</option>
<option value="Mesmerizer">Mesmerizer</option>
</select>
<button id="startBtn">START</button>
</div>

<img id="showStart" src="SHOW_START.png">
<div id="results">
<div class="rank" id="finalRank">S</div>
<div id="accText"></div>
<div id="comboText"></div>
<button onclick="location.reload()">RIGIOCA</button>
</div>

<audio id="bgm" crossorigin="anonymous"></audio>
<audio id="startSfx" src="startSound.mp3"></audio>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");
const bgVideo=document.getElementById("bgVideo");
const bgImg=document.getElementById("bgImg");
const bgm=document.getElementById("bgm");
const showStart=document.getElementById("showStart");
const hitLine=document.getElementById("hitLine");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let gameRunning=false;
let notes=[];
let lastTime=0,lastBeat=0,BPM=140,beatInterval=60/140;
let combo=0,maxCombo=0,totalNotes=0,hitNotes=0,flashAlpha=0;

const columns=4;
const columnWidth=canvas.width/columns;
const columnKeys=["D","F","J","K"];
const columnCodes=["KeyD","KeyF","KeyJ","KeyK"];

const songs={
"BIRDBRAIN":{mp3:"BIRDBRAIN.mp3",BPM:140,speed:400,bgType:"video",bg:"https://drive.google.com/uc?export=download&id=1zC7cSlgmN12A7y2fuAfy2rhKXikPhDJT"},
"Mesmerizer":{mp3:"mesmerizer.mp3",BPM:120,speed:500,bgType:"image",bg:"bg_mesmerizer.png"}
};

let currentSong=songs["BIRDBRAIN"];
document.getElementById("songSelect").onchange=(e)=>{
currentSong=songs[e.target.value];
BPM=currentSong.BPM;
beatInterval=60/BPM;
bgm.src=currentSong.mp3;
};

document.getElementById("startBtn").onclick=()=>{
document.getElementById("menu").style.opacity=0;
document.getElementById("startSfx").play();
setTimeout(()=>{
document.getElementById("menu").style.display="none";
showStart.style.display="block";
setTimeout(()=>{showStart.style.display="none";startGame()},1000);
},500);
};

function startGame(){
notes=[];
lastBeat=0;
combo=0;maxCombo=0;totalNotes=0;hitNotes=0;
gameRunning=true;

// impostazione sfondo
if(currentSong.bgType==="video"){
bgImg.style.opacity=0;
bgVideo.src=currentSong.bg;
bgVideo.style.opacity=1;
bgVideo.play();
}else{
bgVideo.style.opacity=0;
bgImg.src=currentSong.bg;
bgImg.style.opacity=1;
}
bgm.currentTime=0;
bgm.play();
requestAnimationFrame(gameLoop);

// colonne e barre
for(let i=1;i<columns;i++){
let bar=document.createElement("div");
bar.className="columnBar";
bar.style.left=(i*columnWidth)+"px";
document.body.appendChild(bar);
}
for(let i=0;i<columns;i++){
let label=document.createElement("div");
label.className="columnKey";
label.style.left=(i*columnWidth+columnWidth/2)+"px";
label.innerText=columnKeys[i];
document.body.appendChild(label);
}
}

// spawn note in base al tempo
function generateNotes(time){
while(time-lastBeat>=beatInterval){
let col=Math.floor(Math.random()*columns);
notes.push({x:col*columnWidth+20,y:-50,col:col,hit:false});
lastBeat+=beatInterval;
totalNotes++;
}
}

// input
let keysPressed={};
document.addEventListener("keydown",e=>{
if(keysPressed[e.code])return;
keysPressed[e.code]=true;
for(let note of notes){
if(note.hit)continue;
if(note.y>canvas.height-120 && note.y<canvas.height-40 && e.code===columnCodes[note.col]){
note.hit=true;
combo++;hitNotes++;
if(combo>maxCombo)maxCombo=combo;
flashAlpha=0.5;
let img=new Image();img.src="PERFECT.png";ctx.drawImage(img,note.x,note.y,100,50);
}
}
});
document.addEventListener("keyup",e=>{keysPressed[e.code]=false;});

// game loop
function gameLoop(timestamp){
if(!gameRunning)return;
let delta=(timestamp-lastTime)/1000;
lastTime=timestamp;

generateNotes(bgm.currentTime);

ctx.clearRect(0,0,canvas.width,canvas.height);

// draw notes
for(let note of notes){
if(note.hit)continue;
note.y+=currentSong.speed*delta;
ctx.fillStyle="red";
ctx.fillRect(note.x,note.y,columnWidth-40,50);
if(note.y>canvas.height-70){
note.hit=true;
combo=0;
let img=new Image();img.src="MISS.png";ctx.drawImage(img,note.x,canvas.height-70,100,50);
}
}

// flash effetto hit
if(flashAlpha>0){
ctx.fillStyle="rgba(255,255,255,"+flashAlpha+")";
ctx.fillRect(0,0,canvas.width,canvas.height);
flashAlpha-=0.03;
}

// video zoom
if(currentSong.bgType==="video") bgVideo.style.transform="translate(-50%,-50%) scale("+(1+combo/300)+")";

if(bgm.ended){endGame();return;}
requestAnimationFrame(gameLoop);
}

// fine gioco
function endGame(){
gameRunning=false;
document.getElementById("results").style.display="flex";
let acc=(hitNotes/totalNotes)*100;
let rank="D";
if(acc>95)rank="S";
else if(acc>85)rank="A";
else if(acc>70)rank="B";
else if(acc>50)rank="C";
document.getElementById("finalRank").innerText=rank;
document.getElementById("accText").innerText="Accuracy: "+acc.toFixed(1)+"%";
document.getElementById("comboText").innerText="Max Combo: "+maxCombo;
}
</script>
</body>
</html>
