<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIRDBRAIN Rhythm Auto</title>
<style>
body {margin:0;overflow:hidden;font-family:Arial;background:black;color:white;}
#score,#combo{position:absolute;top:10px;font-size:24px;z-index:10;}
#score{left:10px;} #combo{right:10px;}
#gameCanvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;}
#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;
    background:url('immagine_2026-03-03_204259655.png') center center/cover no-repeat;
    filter:brightness(0.4) blur(4px);}
#hitLine{
    position:absolute;
    bottom:70px;
    left:0;
    width:100%;
    height:4px;
    background:rgba(255,255,255,0.5);
    z-index:5;
    opacity:0;
    transition: opacity 1.2s ease-in;
}
#menu{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;}
button{font-size:18px;padding:10px 20px;margin:5;}
</style>
</head>
<body>

<div id="bg"></div>
<div id="score">Punti: 0</div>
<div id="combo">Combo: 0x</div>
<div id="hitLine"></div>
<canvas id="gameCanvas"></canvas>

<div id="menu">
<button id="startBtn">Start</button>
<button id="settingsBtn">Impostazioni</button>
</div>

<audio id="bgm" src="BIRDBRAIN.mp3" crossorigin="anonymous"></audio>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");
const bgm=document.getElementById("bgm");
const startBtn=document.getElementById("startBtn");
const settingsBtn=document.getElementById("settingsBtn");
const hitLine=document.getElementById("hitLine");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let notes=[];
let score=0;
let combo=0;
let gameRunning=false;
let hitKey="Space";
let effects=[];

// --- Disegna note ---
function drawNotes(currentTime){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='red';
    notes.forEach(note=>{
        if(note.hit) return;
        const y=(note.time-currentTime)*400; // ora 0 = top
        if(y > canvas.height) return;
        const size=40,radius=8;
        ctx.beginPath();
        ctx.moveTo(note.x+radius,y);
        ctx.lineTo(note.x+size-radius,y);
        ctx.quadraticCurveTo(note.x+size,y,note.x+size,y+radius);
        ctx.lineTo(note.x+size,y+size-radius);
        ctx.quadraticCurveTo(note.x+size,y+size,note.x+size-radius,y+size);
        ctx.lineTo(note.x+radius,y+size);
        ctx.quadraticCurveTo(note.x,y+size,note.x,y+size-radius);
        ctx.lineTo(note.x,y+radius);
        ctx.quadraticCurveTo(note.x,y,note.x+radius,y);
        ctx.fill();
    });
    drawEffects();
}

function drawEffects(){
    effects.forEach((e,i)=>{
        ctx.beginPath();
        ctx.arc(e.x,e.y,e.radius,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${e.alpha})`;
        ctx.fill();
        e.alpha-=0.02;
        e.radius+=1;
        if(e.alpha<=0) effects.splice(i,1);
    });
}

// --- Controllo tasto ---
let keyPressed=false;
document.addEventListener("keydown",e=>{
    if(e.code===hitKey && !keyPressed){
        keyPressed=true;
        const currentTime=bgm.currentTime;
        let hit=false;
        notes.forEach(note=>{
            if(note.hit) return;
            const y=(note.time-currentTime)*400;
            if(y>=canvas.height-110 && y<=canvas.height-50){
                note.hit=true;
                hit=true;
                effects.push({x:note.x+20,y:y+20,alpha:1,radius:10});
            }
        });
        if(hit){combo++; score+=100*combo;} else{combo=0;}
        document.getElementById("score").innerText="Punti: "+score;
        document.getElementById("combo").innerText="Combo: "+combo+"x";
    }
});
document.addEventListener("keyup",e=>{
    if(e.code===hitKey) keyPressed=false;
});

// --- Generazione note automatica con cooldown ---
let audioCtx, analyser, source, dataArray;
let lastNoteTime=0;
const NOTE_COOLDOWN=0.25; // ogni 0.25s massimo una nota

function setupAudio() {
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    source=audioCtx.createMediaElementSource(bgm);
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=512;
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    dataArray=new Uint8Array(analyser.frequencyBinCount);
}

function generateNotes() {
    if(!gameRunning) return;
    analyser.getByteFrequencyData(dataArray);
    let sum=0;
    for(let i=0;i<dataArray.length;i++) sum+=dataArray[i];
    const avg=sum/dataArray.length;
    const currentTime=bgm.currentTime;
    if(avg>50 && (currentTime - lastNoteTime) > NOTE_COOLDOWN){
        const x=Math.random()*(canvas.width-50)+25;
        notes.push({x:x,hit:false,time=currentTime + (canvas.height-70)/400});
        lastNoteTime=currentTime;
    }
    requestAnimationFrame(generateNotes);
}

// --- Loop principale ---
function gameLoop(){
    if(!gameRunning) return;
    const currentTime=bgm.currentTime;
    drawNotes(currentTime);
    requestAnimationFrame(gameLoop);
}

// --- Start e impostazioni ---
startBtn.addEventListener("click",()=>{
    if(gameRunning) return;
    gameRunning=true;
    document.getElementById("menu").style.display="none";
    setupAudio();

    // Ritardo iniziale di 1.5s
    setTimeout(()=>{
        hitLine.style.display="block";
        hitLine.style.opacity=1; // fade-in
        bgm.currentTime=0;
        bgm.play();
        generateNotes();
        requestAnimationFrame(gameLoop);
    },1500);
});

settingsBtn.addEventListener("click",()=>{
    const newKey=prompt("Inserisci il tasto da usare (es. Space, KeyZ, KeyX):",hitKey);
    if(newKey) hitKey=newKey;
    alert("Tasto impostato su: "+hitKey);
});
</script>
</body>
</html>
