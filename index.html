<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rhythm Game</title>

<style>

body{
margin:0;
background:#000;
font-family:Arial;
color:white;
overflow:hidden;
}

/* MENU */

#menu{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

#wheel{
width:420px;
height:420px;
overflow-y:auto;
background:#111;
border:3px solid #444;
padding:10px;
}

.song{
padding:14px;
margin:6px 0;
background:#222;
cursor:pointer;
transition:.2s;
}

.song:hover{
background:#555;
transform:scale(1.05);
}

.selected{
background:#888;
}

#difficulty{
margin-top:10px;
font-size:18px;
text-align:center;
}

.diff{
cursor:pointer;
margin-right:12px;
}

/* GAME */

#game{
display:none;
}

#hitbar{
position:absolute;
bottom:120px;
width:100%;
height:6px;
background:white;
}

.note{
position:absolute;
width:60px;
height:60px;
}

.arrow{
width:0;
height:0;
border-left:30px solid transparent;
border-right:30px solid transparent;
border-bottom:60px solid #00ffff;
}

.left{ transform:rotate(-90deg); }
.up{ transform:rotate(0deg); }
.down{ transform:rotate(180deg); }
.right{ transform:rotate(90deg); }

.special{
width:50px;
height:50px;
background:#ff00ff;
transform:rotate(45deg);
}

#rating{
position:absolute;
top:40%;
left:50%;
transform:translateX(-50%);
font-size:40px;
pointer-events:none;
}

</style>
</head>

<body>

<div id="menu">

<div>

<h1 style="text-align:center;">Rhythm Game</h1>

<div id="wheel"></div>

<div id="difficulty">
<span class="diff" data="easy">Easy</span>
<span class="diff" data="normal">Normal</span>
<span class="diff" data="hard">Hard</span>
</div>

</div>

</div>

<div id="game">

<div id="hitbar"></div>
<div id="rating"></div>

</div>

<audio id="preview"></audio>
<audio id="music"></audio>

<script>

/* SONG DATABASE (audio online così non servono file) */

const songs={
birdbrain:{
title:"BIRDBRAIN",
audio:"https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3"
},
mesmerizer:{
title:"MESMERIZER",
audio:"https://cdn.pixabay.com/download/audio/2022/02/23/audio_d1718f9c3c.mp3"
},
echo:{
title:"ECHO",
audio:"https://cdn.pixabay.com/download/audio/2022/10/25/audio_9465e9b2c0.mp3"
}
}

const wheel=document.getElementById("wheel")
const preview=document.getElementById("preview")
const music=document.getElementById("music")
const menu=document.getElementById("menu")
const game=document.getElementById("game")

let currentSong=null
let difficulty="normal"

/* CREATE SONG LIST */

for(const key in songs){

const div=document.createElement("div")
div.className="song"
div.innerText=songs[key].title

div.onclick=()=>{

document.querySelectorAll(".song").forEach(s=>s.classList.remove("selected"))
div.classList.add("selected")

currentSong=songs[key]

preview.src=currentSong.audio
preview.currentTime=0
preview.play()

}

div.ondblclick=()=>{

startGame()

}

wheel.appendChild(div)

}

/* DIFFICULTY */

document.querySelectorAll(".diff").forEach(d=>{

d.onclick=()=>{

difficulty=d.getAttribute("data")

document.querySelectorAll(".diff").forEach(x=>x.style.color="white")
d.style.color="yellow"

}

})

/* START GAME */

function startGame(){

if(!currentSong) return

preview.pause()

menu.style.display="none"
game.style.display="block"

music.src=currentSong.audio
music.currentTime=0
music.play()

spawnNotes()

}

/* LANES */

const lanes=[
{key:"D",x:400,type:"left"},
{key:"F",x:470,type:"up"},
{key:"H",x:540,type:"special"},
{key:"J",x:610,type:"down"},
{key:"K",x:680,type:"right"}
]

/* SPAWN NOTES */

function spawnNotes(){

let time=0

for(let i=0;i<80;i++){

time+=400+Math.random()*120

setTimeout(()=>{

const lane=lanes[Math.floor(Math.random()*lanes.length)]

const note=document.createElement("div")
note.className="note"

if(lane.type==="special"){

note.classList.add("special")

}else{

const arrow=document.createElement("div")
arrow.className="arrow "+lane.type
note.appendChild(arrow)

}

note.style.left=lane.x+"px"
note.style.top="-60px"

note.dataset.key=lane.key

game.appendChild(note)

fall(note)

},time)

}

}

/* FALL */

function fall(note){

let y=-60

const interval=setInterval(()=>{

y+=4
note.style.top=y+"px"

if(y>window.innerHeight){

showRating("MISS")
note.remove()
clearInterval(interval)

}

},16)

}

/* INPUT */

document.addEventListener("keydown",e=>{

const notes=document.querySelectorAll(".note")

notes.forEach(n=>{

if(n.dataset.key===e.key.toUpperCase()){

const y=parseInt(n.style.top)

if(Math.abs(y-(window.innerHeight-140))<30){

showRating("SICK")

}else if(Math.abs(y-(window.innerHeight-140))<60){

showRating("GOOD")

}else{

showRating("BAD")

}

n.remove()

}

})

})

/* RATING */

function showRating(text){

const rating=document.getElementById("rating")

rating.innerText=text
rating.style.opacity=1

setTimeout(()=>{

rating.style.opacity=0

},400)

}

</script>

</body>
</html>
