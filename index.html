<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOCALOID TEST</title>
<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial;color:white;}
#starsCanvas{
  position:absolute; top:0; left:0; width:100%; height:100%; z-index:1;
}
#bgImg{
  position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:0;
  opacity:0; transition:opacity 1s; filter:blur(6px) brightness(0.45);
}
#gameCanvas{position:absolute;width:100%;height:100%;z-index:2;}
#introScreen{
  position:absolute;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;
  background:black;z-index:10;opacity:1;transition:opacity 0.5s;
}
#logo{width:350px;margin-bottom:20px;filter:drop-shadow(0 0 20px white);}
#menuTabs button{margin:0 10px;padding:10px 15px;cursor:pointer;}
#songSelector{margin-top:10px;padding:5px;}
#songInfo{margin-top:10px;font-size:16px;}
#startBtn,#settingsBtn,#backToMenu{padding:10px 20px;font-size:18px;cursor:pointer;background: rgba(255,255,255,0.1);color:white;border:2px solid white;border-radius:6px;margin:5px;}
#score,#combo,#rank{position:absolute;top:10px;font-size:22px;z-index:5;}
#score{left:10px;} #combo{left:200px;} #rank{left:360px;}
.columnLabel{position:absolute;font-size:20px;text-align:center;transform:translateX(-50%);color:white;}
#settingsPanel{position:absolute;top:50px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);padding:15px;border-radius:8px;display:none;z-index:20;min-width:300px;}
#keySettings td{border:1px solid rgba(255,255,255,0.3);padding:8px 15px;text-align:center;cursor:pointer;color:white;font-weight:bold;}
#keySettings td:hover{background:rgba(255,255,255,0.2);}
</style>
</head>
<body>

<canvas id="starsCanvas"></canvas>
<img id="bgImg">

<div id="introScreen">
    <img id="logo" src="Risorsa_1sinny.png" alt="Logo">
    <div id="menuTabs" style="display:flex;margin-bottom:20px;">
        <button id="tabMainBtn">Menu</button>
        <button id="tabSongsBtnMain">Songs</button>
    </div>

    <div id="menuTabMain" style="display:flex;flex-direction:column;align-items:center;">
        <h1>VOCALOID TEST</h1>
        <button id="startBtn">START</button>
        <button id="settingsBtn">IMPOSTAZIONI</button>
    </div>

    <div id="menuTabSongs" style="display:none;flex-direction:column;align-items:center;">
        <h2>Seleziona Canzone</h2>
        <select id="songSelector">
            <option value="BIRDBRAIN">BIRDBRAIN</option>
            <option value="Mesmerizer">MESMERIZER</option>
            <option value="ECHO">ECHO</option>
        </select>
        <div id="songInfo"></div>
        <button id="backToMenu">← Torna al Menu</button>
    </div>
</div>

<div id="settingsPanel">
<div id="settingsTabs">
<button id="tabKeysBtn">Tasti e Volume</button>
<button id="tabSongsBtn">Selezione Canzoni</button>
</div>
<div id="tabContent">
<div id="tabKeys">
<table id="keySettings"><tr>
<td id="col0">D</td>
<td id="col1">F</td>
<td id="col2">J</td>
<td id="col3">K</td>
<td id="col4">K</td>
</tr></table>
<div style="margin-top:10px;">Volume: <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5"></div>
</div>
<div id="tabSongs" style="display:none;">
<select id="songSelector2">
<option value="BIRDBRAIN">BIRDBRAIN</option>
<option value="Mesmerizer">MESMERIZER</option>
<option value="ECHO">ECHO</option>
</select>
</div>
</div>
</div>

<canvas id="gameCanvas"></canvas>
<div id="score">Punti: 0</div>
<div id="combo">Combo: 0x</div>
<div id="rank">Rank: F</div>
<audio id="bgm"></audio>
<audio id="bgmMenu" loop></audio>

<script>
window.onload = function() {
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");
const starsCanvas=document.getElementById("starsCanvas");
const starsCtx=starsCanvas.getContext("2d");

let columns = 4;
let arrowZoneWidth, columnWidth, arrowZoneOffset;
let columnKeys=[]; 
const columnColors=[];
let hitLineHeight = 25;

const bgm=document.getElementById("bgm");
const bgmMenu=document.getElementById("bgmMenu");
bgmMenu.src="menu_bgm.mp3"; 
bgmMenu.volume=0.5;

const bgImg=document.getElementById("bgImg");
const scoreDisplay=document.getElementById("score");
const comboDisplay=document.getElementById("combo");
const rankDisplay=document.getElementById("rank");
const selector=document.getElementById("songSelector");
const selector2=document.getElementById("songSelector2");
const introScreen=document.getElementById("introScreen");
const startBtn=document.getElementById("startBtn");
const settingsBtn=document.getElementById("settingsBtn");
const settingsPanel=document.getElementById("settingsPanel");
const tabKeysBtn=document.getElementById("tabKeysBtn");
const tabSongsBtn=document.getElementById("tabSongsBtn");
const tabKeys=document.getElementById("tabKeys");
const tabSongs=document.getElementById("tabSongs");
const logo=document.getElementById("logo");

const tabMainBtn=document.getElementById("tabMainBtn");
const tabSongsBtnMain=document.getElementById("tabSongsBtnMain");
const menuTabMain=document.getElementById("menuTabMain");
const menuTabSongs=document.getElementById("menuTabSongs");
const backToMenu=document.getElementById("backToMenu");
const songInfo=document.getElementById("songInfo");

const songs={
"BIRDBRAIN":{mp3:"BIRDBRAIN.mp3",BPM:140,difficulty:"MEDIO",color:"yellow",speed:300,bg:"immagine_2026-03-03_204259655.png"},
"Mesmerizer":{mp3:"mesmerizer.mp3",BPM:120,difficulty:"DIFFICILE",color:"red",speed:400*1.75,bg:"immagine_2026-03-03_221829535.png"},
"ECHO":{mp3:"SpotiDownloader.com - Echo (feat. Crusher-P) - The Living Tombstone.mp3",BPM:130,difficulty:"INSANA",color:"purple",speed:400*1.85,bg:"immagine_2026-03-05_202041367.png"}
};

let currentSong = songs["BIRDBRAIN"];
let notes=[],chart=[],noteIndex=0,hitRatings=[],hitScores=[];
let score=0,combo=0,totalHits=0,totalPerfect=0,noteSpeed=300,gameRunning=false,lastTime=0;
let introBPM = 140;

// ---------- CANVAS E STELLE ----------
function resizeCanvas(){
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    arrowZoneWidth=Math.min(canvas.width*0.6,1200);
    columnWidth=arrowZoneWidth/columns;
    arrowZoneOffset=(canvas.width-arrowZoneWidth)/2;
    hitLineHeight=Math.max(25,canvas.height*0.02);
    starsCanvas.width=window.innerWidth; starsCanvas.height=window.innerHeight;
}
resizeCanvas(); window.addEventListener("resize",resizeCanvas);

let stars=[];
function initStars(count=150){
    stars=[];
    for(let i=0;i<count;i++){
        stars.push({x:Math.random()*starsCanvas.width,y:Math.random()*starsCanvas.height,size:Math.random()*2+1,speed:Math.random()*20+10});
    }
}
initStars();

let lastStarTime=0;
function animateStars(timestamp){
    const delta=(timestamp-lastStarTime)/1000||0;
    lastStarTime=timestamp;
    starsCtx.clearRect(0,0,starsCanvas.width,starsCanvas.height);
    for(let s of stars){
        s.y+=s.speed*delta;
        if(s.y>starsCanvas.height)s.y=0;
        starsCtx.fillStyle=`rgba(255,255,255,${0.5+Math.random()*0.5})`;
        starsCtx.beginPath(); starsCtx.arc(s.x,s.y,s.size,0,2*Math.PI); starsCtx.fill();
    }
    requestAnimationFrame(animateStars);
}
requestAnimationFrame(animateStars);

// ---------- LOGO FLOTTANTE ----------
let introFloatTime=0,lastIntroTime=0;
function animateLogoFloat(delta){
    introFloatTime+=delta;
    const amplitude=5,speed=0.5;
    const yOffset=Math.sin(introFloatTime*speed*2*Math.PI)*amplitude;
    logo.style.transform=`translateY(${yOffset}px)`;
}
function introLoop(timestamp){
    const delta=(timestamp-lastIntroTime)/1000||0;
    lastIntroTime=timestamp;
    animateLogoFloat(delta);
    requestAnimationFrame(introLoop);
}
requestAnimationFrame(introLoop);

// ---------- TAB CANZONI ----------
function updateSongInfo(){
    const song=songs[selector.value];
    songInfo.innerHTML=`<strong>${selector.value}</strong><br>Difficulty: <span style="color:${song.color}">${song.difficulty}</span><br>BPM: ${song.BPM}`;
}
selector.onchange=()=>{
    currentSong=songs[selector.value];
    updateSongInfo();
    bgmMenu.pause();
    bgmMenu.src=currentSong.mp3;
    bgmMenu.play().catch(()=>{});
}
updateSongInfo();

tabMainBtn.onclick=()=>{menuTabMain.style.display="flex"; menuTabSongs.style.display="none";}
tabSongsBtnMain.onclick=()=>{menuTabMain.style.display="none"; menuTabSongs.style.display="flex";}
backToMenu.onclick=()=>{
    menuTabMain.style.display="flex"; menuTabSongs.style.display="none";
    bgmMenu.pause();
    bgmMenu.src="menu_bgm.mp3";
    bgmMenu.play().catch(()=>{});
}

// ---------- BGM MENU AUTOPLAY ----------
document.body.addEventListener("click",()=>{bgmMenu.play().catch(()=>{});},{once:true});

// ---------- START GAME ----------
function startGame(){ 
    // Qui inserisci la logica completa del tuo rhythm game originale
    bgm.src=currentSong.mp3; 
    bgm.currentTime=0;
    bgm.volume=document.getElementById("volumeSlider").value;
    bgm.play();
}

startBtn.onclick=()=>{
    introScreen.style.opacity=0;
    setTimeout(()=>{
        introScreen.style.display="none";
        bgImg.src=currentSong.bg;
        bgImg.style.opacity=1;
        bgmMenu.pause();
        startGame();
    },500);
}

};
</script>
</body>
</html>
