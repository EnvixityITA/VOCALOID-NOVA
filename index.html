<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>VOCALOID NOVA</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
color:white;
}

#bgImg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
opacity:0;
transition:opacity 1s, transform .1s;
filter:blur(6px) brightness(0.45);
}

#gameCanvas{
position:absolute;
width:100%;
height:100%;
z-index:1;
}

#introScreen{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
z-index:10;
}

#difficulty{
color:#ffd500;
margin-top:5px;
}

#score,#combo,#rank{
position:absolute;
top:10px;
font-size:22px;
z-index:5;
}

#score{left:10px}
#combo{left:200px}
#rank{left:360px}

.columnLabel{
position:absolute;
bottom:30px;
width:100px;
text-align:center;
font-size:20px;
transform:translateX(-50%);
color:white;
}

#hitLine{
position:absolute;
bottom:70px;
width:100%;
height:3px;
background:white;
}

</style>
</head>

<body>

<img id="bgImg">

<div id="introScreen">

<h1 id="songTitle">BIRDBRAIN</h1>
<div id="difficulty"></div>

<select id="songSelector">
<option value="BIRDBRAIN">BIRDBRAIN</option>
<option value="Mesmerizer">Mesmerizer</option>
</select>

<button id="startBtn">Start</button>

</div>

<canvas id="gameCanvas"></canvas>

<div id="hitLine"></div>

<div id="score">Punti: 0</div>
<div id="combo">Combo: 0x</div>
<div id="rank">Rank: F</div>

<audio id="bgm"></audio>

<script>

const canvas=document.getElementById("gameCanvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

const columns=4
const columnWidth=canvas.width/columns

const columnKeys=["D","F","J","K"]
const columnCodes=["KeyD","KeyF","KeyJ","KeyK"]

const columnColors=[
"#00e5ff",
"#00ff90",
"#ff3df2",
"#ffd500"
]

const songs={

"BIRDBRAIN":{
mp3:"BIRDBRAIN.mp3",
BPM:140,
difficulty:"MEDIO",
bg:"immagine_2026-03-03_204259655.png"
},

"Mesmerizer":{
mp3:"mesmerizer.mp3",
BPM:120,
difficulty:"DIFFICILE",
bg:"immagine_2026-03-03_221829535.png"
}

}

let currentSong=songs["BIRDBRAIN"]

const bgm=document.getElementById("bgm")
const bgImg=document.getElementById("bgImg")

const scoreDisplay=document.getElementById("score")
const comboDisplay=document.getElementById("combo")
const rankDisplay=document.getElementById("rank")

let notes=[]
let particles=[]
let chart=[]
let noteIndex=0

let score=0
let combo=0
let totalHits=0
let totalPerfect=0

let noteSpeed=400
let gameRunning=false

const selector=document.getElementById("songSelector")

function updateSongUI(){

document.getElementById("songTitle").innerText=selector.value
document.getElementById("difficulty").innerText=
"Difficoltà: "+currentSong.difficulty

}

selector.onchange=()=>{
currentSong=songs[selector.value]
updateSongUI()
}

updateSongUI()

document.getElementById("startBtn").onclick=()=>{

document.getElementById("introScreen").style.display="none"

bgImg.src=currentSong.bg
bgImg.style.opacity=1

startGame()

}

function generateFullChart(){

chart=[]

const BPM=currentSong.BPM
const beat=60/BPM
const duration=bgm.duration

for(let t=0;t<duration;t+=beat){

chart.push({

time:t,
column:Math.floor(Math.random()*columns)

})

}

}

function startGame(){

notes=[]
chart=[]
noteIndex=0

score=0
combo=0
totalHits=0
totalPerfect=0

bgm.src=currentSong.mp3
bgm.currentTime=0

bgm.onloadedmetadata=()=>{

generateFullChart()

bgm.play()

gameRunning=true

requestAnimationFrame(gameLoop)

}

}

function spawnParticles(x,y,color){

for(let i=0;i<12;i++){

particles.push({

x:x,
y:y,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:1,
color:color

})

}

}

document.addEventListener("keydown",e=>{

if(!gameRunning)return

for(let note of notes){

if(note.hit)continue

if(e.code===columnCodes[note.column]
&& note.y>canvas.height-120
&& note.y<canvas.height-40){

note.hit=true

combo++
totalHits++

const dist=Math.abs(note.y-(canvas.height-70))

if(dist<5)totalPerfect++

score+=100*(1+combo*0.05)

spawnParticles(
note.column*columnWidth+columnWidth/2,
canvas.height-70,
columnColors[note.column]
)

updateRank()

}

}

})

function updateRank(){

if(totalHits==0)return

const acc=totalPerfect/totalHits

let rank="F"

if(acc>0.95)rank="S"
else if(acc>0.85)rank="A"
else if(acc>0.7)rank="B"
else if(acc>0.55)rank="C"
else if(acc>0.4)rank="D"

rankDisplay.innerText="Rank: "+rank

}

function spawnNotes(time){

while(
noteIndex<chart.length &&
chart[noteIndex].time-2<=time
){

notes.push({
y:-50,
column:chart[noteIndex].column,
hit:false
})

noteIndex++

}

}

function drawColumns(){

for(let i=1;i<columns;i++){

ctx.strokeStyle="rgba(255,255,255,0.2)"
ctx.beginPath()
ctx.moveTo(i*columnWidth,0)
ctx.lineTo(i*columnWidth,canvas.height)
ctx.stroke()

}

}

function drawKeyLabels(){

for(let i=0;i<columns;i++){

let label=document.getElementById("label"+i)

if(!label){

label=document.createElement("div")
label.id="label"+i
label.className="columnLabel"
label.innerText=columnKeys[i]
document.body.appendChild(label)

}

label.style.left=(i*columnWidth+columnWidth/2)+"px"

}

}

let lastTime=0

function gameLoop(timestamp){

if(!gameRunning)return

const delta=(timestamp-lastTime)/1000
lastTime=timestamp

spawnNotes(bgm.currentTime)

ctx.clearRect(0,0,canvas.width,canvas.height)

drawColumns()
drawKeyLabels()

for(let note of notes){

if(note.hit)continue

note.y+=noteSpeed*delta

ctx.fillStyle=columnColors[note.column]

ctx.fillRect(
note.column*columnWidth+10,
note.y,
columnWidth-20,
50
)

if(note.y>canvas.height-70){

note.hit=true
combo=0

}

}

for(let i=particles.length-1;i>=0;i--){

const p=particles[i]

ctx.globalAlpha=p.life
ctx.fillStyle=p.color

ctx.beginPath()
ctx.arc(p.x,p.y,4,0,Math.PI*2)
ctx.fill()

p.x+=p.vx
p.y+=p.vy
p.life-=0.03

if(p.life<=0)particles.splice(i,1)

}

ctx.globalAlpha=1

scoreDisplay.innerText="Punti: "+score
comboDisplay.innerText="Combo: "+combo+"x"

requestAnimationFrame(gameLoop)

}

</script>

</body>
</html>
</body>
</html>
