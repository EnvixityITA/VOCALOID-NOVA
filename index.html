<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>War Thunder Wiki ITA</title>

<link href="https://fonts.googleapis.com/css2?family=Teko:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: black;
    color: white;
    overflow-x: hidden;
    font-family: Arial, sans-serif;
}

/* INTRO CINEMATOGRAFICA */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    z-index: 999;
    animation: fadeIntro 2s ease forwards;
}

@keyframes fadeIntro {
    to { opacity: 0; visibility: hidden; }
}

/* STELLE */
#stars {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -3;
}

/* SEZIONE */
section {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    text-align: center;
}

/* TITOLO STILE LOGO */
.main-title {
    font-family: 'Teko', sans-serif;
    font-size: 5em;
    letter-spacing: 8px;
    text-transform: uppercase;
    background: linear-gradient(to bottom, #ffffff, #bbbbbb, #777777);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow:
        0 0 5px rgba(255,255,255,0.4),
        0 0 20px rgba(200,200,200,0.3);
    margin-bottom: 30px;
    z-index: 2;
}

/* CONTENITORE IMMAGINE */
.image-container {
    position: relative;
    width: 85%;
    max-width: 800px;
}

/* IMMAGINE */
.hero-img {
    width: 100%;
    border-radius: 10px;
    box-shadow: 0 0 40px rgba(255,255,255,0.2);
    animation: slowZoom 15s infinite alternate ease-in-out;
}

/* ZOOM CINEMATICO */
@keyframes slowZoom {
    from { transform: scale(1); }
    to { transform: scale(1.08); }
}

/* FUMO DAVANTI */
.smoke-front {
    position: absolute;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(255,255,255,0.25) 0%, transparent 70%);
    border-radius: 50%;
    filter: blur(60px);
    animation: smokeMove 12s infinite alternate ease-in-out;
    z-index: 3;
}

.smoke-front:nth-child(2) {
    top: 20%;
    left: 10%;
}

.smoke-front:nth-child(3) {
    top: 40%;
    right: 10%;
    animation-delay: 4s;
}

@keyframes smokeMove {
    0% { transform: scale(1) translateY(0); opacity: 0.5; }
    100% { transform: scale(1.6) translateY(-60px); opacity: 0.1; }
}

/* RESPONSIVE */
@media (max-width: 600px) {
    .main-title { font-size: 3em; }
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<section>

<h1 class="main-title">WAR THUNDER WIKI ITA</h1>

<div class="image-container">
    <img class="hero-img" src="opengraph-wt.jpg" alt="War Thunder">
    
    <!-- FUMO DAVANTI -->
    <div class="smoke-front"></div>
    <div class="smoke-front"></div>
</div>

</section>

<script>
/* STELLE */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 200; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 2,
        velocity: Math.random() * 0.5
    });
}

function animateStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";

    stars.forEach(star => {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        ctx.fill();

        star.y += star.velocity;
        if (star.y > canvas.height) {
            star.y = 0;
            star.x = Math.random() * canvas.width;
        }
    });

    requestAnimationFrame(animateStars);
}

animateStars();
</script>

</body>
</html>
