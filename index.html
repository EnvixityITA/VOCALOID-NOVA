<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOCALOID TEST - OSU STYLE</title>
<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial;color:white;}
#starsCanvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;}
#bgImg{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0;opacity:0;transition:opacity 0.5s;filter:blur(6px) brightness(0.45);}
#gameCanvas{position:absolute;width:100%;height:100%;z-index:3;}
#introScreen{position:absolute;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;background:black;z-index:10;opacity:1;transition:opacity 0.5s;}
#logo{width:350px;margin-bottom:20px;filter:drop-shadow(0 0 20px white);}
#menuTabMain{display:flex;flex-direction:column;align-items:center;}
#startBtn,#settingsBtn{padding:10px 20px;font-size:18px;cursor:pointer;background: rgba(255,255,255,0.1);color:white;border:2px solid white;border-radius:6px;margin:5px;}
#score,#combo,#rank{position:absolute;top:10px;font-size:22px;z-index:5;}
#score{left:10px;} #combo{left:200px;} #rank{left:360px;}
#songList{position:absolute;top:80px;left:20px;width:220px;height:70%;overflow:hidden;display:flex;flex-direction:column;z-index:12;}
.songItem{display:flex;align-items:center;padding:5px;cursor:pointer;transition:0.2s;background:rgba(0,0,0,0.1);margin-bottom:5px;border-radius:4px;}
.songItem.selected{background:rgba(255,255,0,0.3);}
.songItem img{width:50px;height:50px;margin-right:10px;object-fit:cover;border-radius:4px;}
.songItem span{color:white;font-weight:bold;}
#songInfo{position:absolute;top:20px;left:260px;color:white;font-size:16px;}
#settingsPanel{position:absolute;top:50px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);padding:15px;border-radius:8px;display:none;z-index:20;min-width:300px;}
#keySettings td{border:1px solid rgba(255,255,255,0.3);padding:8px 15px;text-align:center;cursor:pointer;color:white;font-weight:bold;}
#keySettings td:hover{background:rgba(255,255,255,0.2);}
</style>
</head>
<body>

<canvas id="starsCanvas"></canvas>
<img id="bgImg">

<div id="introScreen">
    <img id="logo" src="Risorsa_1sinny.png" alt="Logo">
    <div id="menuTabMain">
        <h1>VOCALOID TEST</h1>
        <button id="startBtn">START</button>
        <button id="settingsBtn">IMPOSTAZIONI</button>
    </div>
</div>

<div id="songList"></div>
<div id="songInfo">Seleziona una canzone per iniziare</div>

<div id="settingsPanel">
<div id="tabContent">
<div id="tabKeys">
<table id="keySettings"><tr>
<td id="col0">D</td>
<td id="col1">F</td>
<td<td id="col2">J</td>
<td id="col3">K</td>
<td id="col4">K</td>
</tr></table>
<div style="margin-top:10px;">Volume: <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5"></div>
</div>
</div>
</div>

<canvas id="gameCanvas"></canvas>
<div id="score">Punti: 0</div>
<div id="combo">Combo: 0x</div>
<div id="rank">Rank: F</div>
<audio id="bgm"></audio>
<audio id="bgmMenu" loop></audio>

<script>
window.onload=function(){
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");
const starsCanvas=document.getElementById("starsCanvas");
const starsCtx=starsCanvas.getContext("2d");
const bgm=document.getElementById("bgm");
const bgmMenu=document.getElementById("bgmMenu");
const bgImg=document.getElementById("bgImg");
const startBtn=document.getElementById("startBtn");
const logo=document.getElementById("logo");
const songListDiv=document.getElementById("songList");
const songInfoDiv=document.getElementById("songInfo");
const volumeSlider=document.getElementById("volumeSlider");

bgmMenu.volume=0.5;

// --- CANVAS ---
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;starsCanvas.width=window.innerWidth;starsCanvas.height=window.innerHeight;}
resizeCanvas();window.addEventListener("resize",resizeCanvas);

// --- STELLE ---
let stars=[];
for(let i=0;i<150;i++){stars.push({x:Math.random()*starsCanvas.width,y:Math.random()*starsCanvas.height,size:Math.random()*2+1,speed:Math.random()*20+10});}
let lastStarTime=0;
function animateStars(timestamp){
    const delta=(timestamp-lastStarTime)/1000||0;lastStarTime=timestamp;
    lastStarTime=timestamp;
    starsCtx.clearRect(0,0,starsCanvas.width,starsCanvas.height);
    for(let s of stars){s.y+=s.speed*delta;if(s.y>starsCanvas.height)s.y=0;starsCtx.fillStyle=`rgba(255,255,255,${0.5+Math.random()*0.5})`;starsCtx.beginPath();starsCtx.arc(s.x,s.y,s.size,0,2*Math.PI);starsCtx.fill();}
    requestAnimationFrame(animateStars);
}
requestAnimationFrame(animateStars);

// --- LOGO FLOTTANTE ---
let floatTime=0,lastTime=0;
function animateLogo(timestamp){
    const delta=(timestamp-lastTime)/1000||0;
    lastTime=timestamp;
    floatTime+=delta;
    const y=Math.sin(floatTime*0.4*2*Math.PI)*3;
    logo.style.transform=`translateY(${y}px)`;
    requestAnimationFrame(animateLogo);
}
requestAnimationFrame(animateLogo);

// --- SONGS ---
const songs={
"BIRDBRAIN":{mp3:"BIRDBRAIN.mp3",BPM:140,difficulty:"MEDIO",color:"yellow",bg:"immagine_2026-03-03_204259655.png",speed:300},
"Mesmerizer":{mp3:"mesmerizer.mp3",BPM:120,difficulty:"DIFFICILE",color:"red",bg:"immagine_2026-03-03_221829535.png",speed:400*1.75},
"ECHO":{mp3:"SpotiDownloader.com - Echo (feat. Crusher-P) - The Living Tombstone.mp3",BPM:130,difficulty:"INSANA",color:"purple",bg:"immagine_2026-03-05_202041367.png",speed:400*1.85}
};
let currentSong=null;

// --- CREA LISTA SONGS ---
for(let key in songs){
    let div=document.createElement("div");
    div.className="songItem";
    let img=document.createElement("img");
    img.src=songs[key].bg;
    let span=document.createElement("span");
    span.innerText=key;
    div.appendChild(img);
    div.appendChild(span);
    div.onclick=()=>{selectSong(key);}
    songListDiv.appendChild(div);
}

function selectSong(key){
    currentSong=key;
    for(let item of document.getElementsByClassName("songItem")){
        item.classList.remove("selected");
        if(item.querySelector("span").innerText===key)item.classList.add("selected");
    }
    songInfoDiv.innerHTML=`<strong>${key}</strong><br>Difficulty: <span style="color:${songs[key].color}">${songs[key].difficulty}</span><br>BPM: ${songs[key].BPM}`;
    bgImg.src=songs[key].bg;
    bgmMenu.pause();
    bgmMenu.src=songs[key].mp3;
    bgmMenu.play().catch(()=>{});
}

// --- SCROLL ROTELLINA ---
songListDiv.addEventListener("wheel",(e)=>{e.preventDefault();songListDiv.scrollTop+=e.deltaY;});

// --- GAME VARIABLES ---
let columns=4,columnKeys=[],columnColors=[];
let arrowZoneWidth,columnWidth,arrowZoneOffset,hitLineHeight=25;
let notes=[],chart=[],noteIndex=0,hitRatings=[];
let score=0,combo=0,totalHits=0,totalPerfect=0,noteSpeed=300,gameRunning=false,lastFrameTime=0;
let hitScores=[];

// --- START GAME ---
startBtn.onclick=()=>{
    if(!currentSong){alert("Seleziona prima una canzone!"); return;}
    document.getElementById("introScreen").style.opacity=0;
    setTimeout(()=>{
        document.getElementById("introScreen").style.display="none";
        bgImg.style.opacity=1;
        bgmMenu.pause();
        startGame();
    },500);
}

function startGame(){
    notes=[]; chart=[]; noteIndex=0; score=0; combo=0; totalHits=0; totalPerfect=0; hitScores=[];
    noteSpeed=songs[currentSong].speed;
    columnKeys=["D","F","J","K"];
    columnColors=["#ff0000","#ff8000","#ff40bf","#ffff00"];
    bgm.src=songs[currentSong].mp3; bgm.currentTime=0;
    bgm.volume=volumeSlider.value;
    bgm.onloadedmetadata=()=>{
        generateChart();
        gameRunning=true;
        lastFrameTime=0;
        requestAnimationFrame(gameLoop);
        bgm.play();
    }
}

function generateChart(){
    chart=[];
    const beat=60/songs[currentSong].BPM;
    const duration=bgm.duration||120;
    for(let t=beat; t<duration; t+=beat){
        chart.push({time:t,column:Math.floor(Math.random()*4)});
    }
}

document.addEventListener("keydown",e=>{
    if(!gameRunning) return;
    const hitWindowTop=canvas.height-120;
    const hitWindowBottom=canvas.height-20;
    for(let note of notes){
        if(note.hit) continue;
        const expectedKey=columnKeys[note.column];
        if(e.key.toUpperCase()===expectedKey && note.y>=hitWindowTop && note.y<=hitWindowBottom){
            note.hit=true; combo++; totalHits++;
            const dist=Math.abs(note.y-(canvas.height-70));
            let rating="MEH",scoreMultiplier=0.5;
            if(dist<10){rating="PERFECT";scoreMultiplier=1.0; totalPerfect++;}
            else if(dist<20){rating="SICK";scoreMultiplier=0.9;}
            else if(dist<35){rating="AWESOME";scoreMultiplier=0.8;}
            else if(dist<50){rating="NICE";scoreMultiplier=0.7;}
            score+=100*(1+combo*0.05);
            hitScores.push(scoreMultiplier);
            const img=new Image(); img.src=rating+".png";
            hitRatings.push({img:img,x:arrowZoneOffset+note.column*columnWidth+columnWidth/2,y:canvas.height-120,alpha:1});
        }
    }
});

function calculateRank(){
    if(hitScores.length===0) return "F";
    const accuracy=hitScores.reduce((a,b)=>a+b,0)/hitScores.length;
    if(accuracy>=0.90) return "S";
    if(accuracy>=0.80) return "A";
    if(accuracy>=0.65) return "B";
    if(accuracy>=0.50) return "C";
    return "F";
}

function resizeGameCanvas(){
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    arrowZoneWidth=Math.min(canvas.width*0.6,1200);
    columnWidth=arrowZoneWidth/columns;
    arrowZoneOffset=(canvas.width-arrowZoneWidth)/2;
    hitLineHeight=Math.max(25,canvas.height*0.02);
}
resizeGameCanvas();
window.addEventListener("resize",resizeGameCanvas);

function spawnNotes(time){
    while(noteIndex<chart.length && chart[noteIndex].time <= time + 0.1){
        if(chart[noteIndex].time>0) notes.push({y:-50,column:chart[noteIndex].column,hit:false});
        noteIndex++;
    }
}

function drawColumns(){
    for(let i=0;i<=columns;i++){
        ctx.strokeStyle="rgba(255,255,255,0.2)";
        ctx.beginPath();
        ctx.moveTo(arrowZoneOffset+i*columnWidth,0);
        ctx.lineTo(arrowZoneOffset+i*columnWidth,canvas.height);
        ctx.stroke();
    }
}

function gameLoop(timestamp){
    if(!gameRunning) return;
    const delta=(timestamp-lastFrameTime)/1000;
    lastFrameTime=timestamp;
    spawnNotes(bgm.currentTime);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="rgba(255,255,255,0.2)";
    ctx.fillRect(arrowZoneOffset,canvas.height-70-hitLineHeight/2,arrowZoneWidth,hitLineHeight);
    drawColumns();
    const missThreshold=canvas.height-20;
    for(let note of notes){
        if(note.hit) continue;
        ctx.fillStyle=columnColors[note.column];
        note.y+=noteSpeed*delta;
        ctx.fillRect(arrowZoneOffset+note.column*columnWidth+10,note.y,columnWidth-20,50);
        if(note.y>missThreshold){
            note.hit=true; combo=0; totalHits++;
            hitScores.push(0);
            const img=new Image(); img.src="MISS.png";
            hitRatings.push({img:img,x:arrowZoneOffset+note.column*columnWidth+columnWidth/2,y:missThreshold,alpha:1});
        }
    }
    for(let i=hitRatings.length-1;i>=0;i--){
        const r=hitRatings[i];
        ctx.globalAlpha=r.alpha;
        ctx.drawImage(r.img,r.x-50,r.y-25,100,50);
        r.y-=1; r.alpha-=0.02;
        if(r.alpha<=0) hitRatings.splice(i,1);
    }
    ctx.globalAlpha=1;
    document.getElementById("score").innerText="Punti: "+Math.floor(score);
    document.getElementById("combo").innerText="Combo: "+combo+"x";
    document.getElementById("rank").innerText="Rank: "+calculateRank();
    requestAnimationFrame(gameLoop);
}

// --- VOLUME ---
volumeSlider.oninput=()=>{bgm.volume=volumeSlider.value;}

};
</script>
</body>
</html>
