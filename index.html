<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teto Rhythm Game</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
}

#score, #combo {
    position: absolute;
    top: 10px;
    font-size: 24px;
    z-index: 10;
}
#score { left: 10px; }
#combo { right: 10px; }

#gameCanvas {
    position: absolute;
    top:0;
    left:0;
    width: 100%;
    height: 100%;
    z-index: 1;
}

#bg {
    position: fixed;
    top:0;
    left:0;
    width: 100%;
    height: 100%;
    z-index: -2;
    background: url('immagine_2026-03-03_204259655.png') center center/cover no-repeat;
    filter: brightness(0.4) blur(4px);
}

#hitLine {
    position: absolute;
    bottom: 70px;
    left: 0;
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.5);
    z-index: 5;
}

button {
    position: absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index: 10;
    font-size: 18px;
    padding: 10px 20px;
}
</style>
</head>
<body>

<div id="bg"></div>
<div id="score">Punti: 0</div>
<div id="combo">Combo: 0x</div>
<div id="hitLine"></div>
<canvas id="gameCanvas"></canvas>

<audio id="bgm" src="BIRDBRAIN.mp3"></audio>
<button id="startBtn">Start!</button>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const bgm = document.getElementById("bgm");
const startBtn = document.getElementById("startBtn");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let notes = []; // {time: secondi, x: posX, hit: false}
let score = 0;
let combo = 0;
let gameRunning = false;

// --- Esempio sincronizzazione: generiamo note ad intervalli precisi ---
const bpm = 140; // battiti per minuto
const beatInterval = 60/bpm; // intervallo in secondi
const noteSpeed = 400; // px/sec
const totalBeats = 100; // numero di note da generare

for(let i=0;i<totalBeats;i++){
    const time = i*beatInterval;
    const x = Math.random()*(canvas.width-30);
    notes.push({time:time, x:x, hit:false});
}

// --- Funzioni ---
function startGame(){
    if(gameRunning) return;
    gameRunning = true;
    startBtn.style.display = "none";
    bgm.currentTime = 0;
    bgm.play();
    requestAnimationFrame(gameLoop);
}

function drawNotes(currentTime){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = 'red';
    notes.forEach(note=>{
        if(note.hit) return;
        // posizione y in base al tempo corrente
        const y = (note.time - currentTime)*noteSpeed + (canvas.height-70);
        if(y < 0) return;
        ctx.fillRect(note.x, y, 30, 30);
    });
}

// Controllo barra spaziatrice singolo colpo
let keyPressed = false;
document.addEventListener("keydown", function(e){
    if(e.code==="Space" && !keyPressed){
        keyPressed = true;
        const currentTime = bgm.currentTime;
        let hit = false;
        notes.forEach(note=>{
            if(note.hit) return;
            const y = (note.time - currentTime)*noteSpeed + (canvas.height-70);
            if(y >= canvas.height-80 && y <= canvas.height-60){
                note.hit = true;
                hit = true;
            }
        });
        if(hit){
            combo +=1;
            score += 100 * combo;
        } else {
            combo = 0;
        }
        document.getElementById("score").innerText = "Punti: " + score;
        document.getElementById("combo").innerText = "Combo: " + combo + "x";
    }
});
document.addEventListener("keyup", function(e){
    if(e.code==="Space") keyPressed = false;
});

function gameLoop(){
    if(!gameRunning) return;
    const currentTime = bgm.currentTime;
    drawNotes(currentTime);
    requestAnimationFrame(gameLoop);
}

startBtn.addEventListener("click", startGame);
</script>
</body>
</html>
