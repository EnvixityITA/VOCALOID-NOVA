<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOCALOID TEST</title>

<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial;color:white;}
#bgImg{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0;opacity:0;transition:opacity 1s;filter:blur(6px) brightness(0.45);}
#gameCanvas{position:absolute;width:100%;height:100%;z-index:1;}
#introScreen{position:absolute;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;background:black;z-index:10;opacity:1;transition:opacity 0.5s;}
#logo{width:350px;margin-bottom:20px;filter:drop-shadow(0 0 20px white);}
#songTitle{font-size:32px;margin-bottom:5px;}
#difficulty{margin-bottom:20px;font-size:20px;}
#startBtn,#settingsBtn{padding:10px 20px;font-size:18px;cursor:pointer;background:rgba(255,255,255,0.1);color:white;border:2px solid white;border-radius:6px;margin:5px;}
#score,#combo,#rank{position:absolute;top:10px;font-size:22px;z-index:5;}
#score{left:10px;} #combo{left:200px;} #rank{left:360px;}
.columnLabel{position:absolute;font-size:20px;text-align:center;transform:translateX(-50%);color:white;}
</style>
</head>

<body>

<img id="bgImg">

<div id="introScreen">
<img id="logo" src="Risorsa_1sinny.png">
<h1 id="songTitle">BIRDBRAIN</h1>
<div id="difficulty"></div>

<select id="songSelector">
<option value="BIRDBRAIN">BIRDBRAIN</option>
<option value="Mesmerizer">MESMERIZER</option>
<option value="ECHO">ECHO</option>
</select>

<button id="startBtn">START</button>
</div>

<canvas id="gameCanvas"></canvas>

<div id="score">Punti: 0</div>
<div id="combo">Combo: 0x</div>
<div id="rank">Rank: F</div>

<audio id="bgm"></audio>

<script>

window.onload=function(){

const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

const bgm=document.getElementById("bgm");
const selector=document.getElementById("songSelector");
const startBtn=document.getElementById("startBtn");
const introScreen=document.getElementById("introScreen");
const bgImg=document.getElementById("bgImg");

const scoreDisplay=document.getElementById("score");
const comboDisplay=document.getElementById("combo");
const rankDisplay=document.getElementById("rank");

let columns=4;
let arrowZoneWidth,columnWidth,arrowZoneOffset;

let notes=[];
let chart=[];
let noteIndex=0;

let score=0;
let combo=0;
let hitScores=[];

let noteSpeed=300;
let gameRunning=false;
let lastTime=0;

let columnKeys=["D","F","J","K"];
let columnColors=["#ff0000","#ff8000","#ff40bf","#ffff00"];

let audioContext;
let analyser;
let dataArray;
let source;

const songs={

"BIRDBRAIN":{
mp3:"BIRDBRAIN.mp3",
BPM:140,
difficulty:"MEDIO",
color:"yellow",
speed:300,
bg:"immagine_2026-03-03_204259655.png",
silentSections:[
[0,3],
[40,44],
[90,94]
]
},

"Mesmerizer":{
mp3:"mesmerizer.mp3",
BPM:120,
difficulty:"DIFFICILE",
color:"red",
speed:700,
bg:"immagine_2026-03-03_221829535.png",
silentSections:[
[0,4],
[55,60]
]
},

"ECHO":{
mp3:"SpotiDownloader.com - Echo (feat. Crusher-P) - The Living Tombstone.mp3",
BPM:130,
difficulty:"INSANA",
color:"purple",
speed:740,
bg:"immagine_2026-03-05_202041367.png",
silentSections:[
[0,6],
[70,75]
]
}

};

let currentSong=songs["BIRDBRAIN"];

function resizeCanvas(){

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

arrowZoneWidth=Math.min(canvas.width*0.6,1200);
columnWidth=arrowZoneWidth/columns;
arrowZoneOffset=(canvas.width-arrowZoneWidth)/2;

}

resizeCanvas();
window.addEventListener("resize",resizeCanvas);

function isSilent(time){

for(let s of currentSong.silentSections){

if(time>=s[0] && time<=s[1]) return true;

}

return false;

}

function getAudioVolume(){

analyser.getByteFrequencyData(dataArray);

let sum=0;

for(let i=0;i<dataArray.length;i++){
sum+=dataArray[i];
}

return sum/dataArray.length;

}

function generateFullChart(){

chart=[];

const beat=60/currentSong.BPM;
const duration=bgm.duration||120;

for(let t=beat;t<duration;t+=beat){

chart.push({

time:t,
column:Math.floor(Math.random()*columns)

});

}

}

startBtn.onclick=()=>{

introScreen.style.display="none";

bgImg.src=currentSong.bg;
bgImg.style.opacity=1;

startGame();

};

function startGame(){

notes=[];
chart=[];
noteIndex=0;

score=0;
combo=0;

hitScores=[];

noteSpeed=currentSong.speed;

bgm.src=currentSong.mp3;
bgm.currentTime=0;

bgm.onloadedmetadata=()=>{

generateFullChart();

audioContext=new(window.AudioContext||window.webkitAudioContext)();

analyser=audioContext.createAnalyser();

source=audioContext.createMediaElementSource(bgm);

source.connect(analyser);
analyser.connect(audioContext.destination);

analyser.fftSize=256;

const bufferLength=analyser.frequencyBinCount;

dataArray=new Uint8Array(bufferLength);

gameRunning=true;

requestAnimationFrame(gameLoop);

bgm.play();

};

}

document.addEventListener("keydown",e=>{

if(!gameRunning)return;

for(let note of notes){

if(note.hit)continue;

let expected=columnKeys[note.column];

if(e.key.toUpperCase()==expected){

note.hit=true;

combo++;

score+=100*(1+combo*0.05);

hitScores.push(1);

}

}

});

function calculateRank(){

if(hitScores.length===0)return "F";

const acc=hitScores.reduce((a,b)=>a+b,0)/hitScores.length;

if(acc>=0.9)return "S";
if(acc>=0.8)return "A";
if(acc>=0.65)return "B";
if(acc>=0.5)return "C";

return "F";

}

function spawnNotes(time){

const volume=getAudioVolume();

while(noteIndex<chart.length && chart[noteIndex].time<=time+0.1){

if(!isSilent(time) && volume>35){

notes.push({
y:-50,
column:chart[noteIndex].column,
hit:false
});

}

noteIndex++;

}

}

function gameLoop(timestamp){

if(!gameRunning)return;

const delta=(timestamp-lastTime)/1000;
lastTime=timestamp;

spawnNotes(bgm.currentTime);

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="rgba(255,255,255,0.2)";
ctx.fillRect(arrowZoneOffset,canvas.height-70,arrowZoneWidth,25);

for(let note of notes){

if(note.hit)continue;

ctx.fillStyle=columnColors[note.column];

note.y+=noteSpeed*delta;

ctx.fillRect(
arrowZoneOffset+note.column*columnWidth+10,
note.y,
columnWidth-20,
50
);

if(note.y>canvas.height-20){

note.hit=true;
combo=0;

hitScores.push(0);

}

}

scoreDisplay.innerText="Punti: "+Math.floor(score);
comboDisplay.innerText="Combo: "+combo+"x";
rankDisplay.innerText="Rank: "+calculateRank();

requestAnimationFrame(gameLoop);

}

selector.onchange=()=>{

currentSong=songs[selector.value];

};

};

</script>

</body>
</html>
