<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhythm Game Pro</title>

<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial;color:white}

/* VIDEO */
#bgVideo{
position:absolute;
top:50%;
left:50%;
width:100%;
height:100%;
transform:translate(-50%,-50%);
object-fit:cover;
z-index:0;
opacity:0;
transition:opacity 1s, transform 0.2s ease;
}

#overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:1;
transition:background 0.2s ease;
}

/* CANVAS */
#gameCanvas{position:absolute;z-index:2}

/* MENU */
#menu{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:5;
background:rgba(0,0,0,0.7);
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

.menuTitle{
font-size:60px;
margin-bottom:20px;
letter-spacing:5px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px white}
to{text-shadow:0 0 30px yellow}
}

button,select{
padding:12px 25px;
margin:10px;
font-size:18px;
background:rgba(255,255,255,0.1);
border:2px solid white;
color:white;
cursor:pointer;
transition:all 0.2s ease;
}

button:hover{
background:white;
color:black;
box-shadow:0 0 15px white;
}

/* SHOW START */
#showStart{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:300px;
display:none;
z-index:10;
}

/* RESULT SCREEN */
#results{
position:absolute;
width:100%;
height:100%;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:6;
background:rgba(0,0,0,0.85);
animation:fadeIn 0.8s ease;
}

.rank{
font-size:120px;
animation:pop 0.6s ease;
}

@keyframes pop{
0%{transform:scale(0)}
100%{transform:scale(1)}
}
</style>
</head>

<body>

<video id="bgVideo" autoplay muted loop playsinline></video>
<div id="overlay"></div>

<canvas id="gameCanvas"></canvas>

<div id="menu">
<div class="menuTitle">RHYTHM GAME</div>
<select id="songSelect">
<option value="BIRDBRAIN">BIRDBRAIN</option>
</select>
<button id="startBtn">START</button>
</div>

<img id="showStart" src="SHOW_START.png">

<div id="results">
<div class="rank" id="finalRank">S</div>
<div id="accText"></div>
<div id="comboText"></div>
<button onclick="location.reload()">RIGIOCA</button>
</div>

<audio id="bgm" src="BIRDBRAIN.mp3"></audio>
<audio id="startSfx" src="startSound.mp3"></audio>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const bgVideo=document.getElementById("bgVideo");
const overlay=document.getElementById("overlay");
const bgm=document.getElementById("bgm");

bgVideo.src="https://drive.google.com/uc?export=download&id=1zC7cSlgmN12A7y2fuAfy2rhKXikPhDJT";

let notes=[];
let BPM=140;
let beatInterval=60/BPM;
let lastBeat=0;
let lastTime=0;
let gameRunning=false;

let combo=0,maxCombo=0,totalNotes=0,hitNotes=0;
let screenShake=0,flashAlpha=0;

const columns=4;
const columnWidth=canvas.width/columns;

document.getElementById("startBtn").onclick=()=>{
document.getElementById("menu").style.opacity=0;
setTimeout(()=>{
document.getElementById("menu").style.display="none";
document.getElementById("showStart").style.display="block";
setTimeout(()=>{
document.getElementById("showStart").style.display="none";
startGame();
},1000);
},500);
};

function startGame(){
bgVideo.style.opacity=1;
bgm.play();
gameRunning=true;
requestAnimationFrame(gameLoop);
}

function generateNotes(time){
while(time-lastBeat>=beatInterval){
let col=Math.floor(Math.random()*columns);
notes.push({x:col*columnWidth+20,y:-50,col:col,hit:false});
lastBeat+=beatInterval;
totalNotes++;
}
}

document.addEventListener("keydown",e=>{
for(let note of notes){
if(note.hit)continue;
if(note.y>canvas.height-120 && note.y<canvas.height-40){
note.hit=true;
combo++;
hitNotes++;
if(combo>maxCombo)maxCombo=combo;

flashAlpha=0.5;

let img=new Image();
img.src="PERFECT.png";
ctx.drawImage(img,note.x,note.y,100,50);
}
}
});

function gameLoop(timestamp){
if(!gameRunning)return;

let delta=(timestamp-lastTime)/1000;
lastTime=timestamp;

generateNotes(bgm.currentTime);

ctx.clearRect(0,0,canvas.width,canvas.height);

if(screenShake>0){
ctx.save();
ctx.translate((Math.random()-0.5)*screenShake,(Math.random()-0.5)*screenShake);
screenShake*=0.9;
}else ctx.save();

for(let note of notes){
if(note.hit)continue;
note.y+=400*delta;
ctx.fillStyle="red";
ctx.fillRect(note.x,note.y,columnWidth-40,50);

if(note.y>canvas.height-70){
note.hit=true;
combo=0;
screenShake=20;
let img=new Image();
img.src="MISS.png";
ctx.drawImage(img,note.x,canvas.height-70,100,50);
}
}

ctx.restore();

const beatProgress=(bgm.currentTime%beatInterval)/beatInterval;
overlay.style.background="rgba(0,0,0,"+(0.45+0.1*Math.sin(beatProgress*Math.PI))+")";

bgVideo.style.transform="translate(-50%,-50%) scale("+(1+combo/300)+")";

if(flashAlpha>0){
ctx.fillStyle="rgba(255,255,255,"+flashAlpha+")";
ctx.fillRect(0,0,canvas.width,canvas.height);
flashAlpha-=0.03;
}

if(bgm.ended){
endGame();
return;
}

requestAnimationFrame(gameLoop);
}

function endGame(){
gameRunning=false;
document.getElementById("results").style.display="flex";

let acc=(hitNotes/totalNotes)*100;
let rank="D";
if(acc>95)rank="S";
else if(acc>85)rank="A";
else if(acc>70)rank="B";
else if(acc>50)rank="C";

document.getElementById("finalRank").innerText=rank;
document.getElementById("accText").innerText="Accuracy: "+acc.toFixed(1)+"%";
document.getElementById("comboText").innerText="Max Combo: "+maxCombo;
}
</script>

</body>
</html>
